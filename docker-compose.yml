services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      OLLAMA_API_URL: http://ollama:11434
      API_KEY: thoovara@hari
    volumes:
      - ./backend/app/database/data:/app/app/database/data
    networks:
      - local-ai-network
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      REACT_APP_API_URL: /api
    networks:
      - local-ai-network
    depends_on:
      - backend
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "6767:6767"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - local-ai-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - local-ai-network
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  local-ai-network:
    driver: bridge
